name: test_if

on:
  push:
    branches:
      - dev
      - release
      - test_if
  pull_request:
    branches:
      - dev
      - release
      - test_if
    paths:
      - .github/workflows/pypi.yml
      - build_scripts/pypi/*.py
      - build_scripts/pypi/package_files/*
  workflow_dispatch:
    inputs:
      post_release_tag:
        description: 'post release tag'
        default: ''
  issue_comment:                                     
    types: [created, edited, deleted]


jobs:
 job01:
   # if: contains(github.event.comment.body, '/support')   # check the comment if it contains the keywords
   runs-on: ubuntu-20.04
   steps:
    - name: say hello
      # if: contains(github.event.comment.body, '/support')   # check the comment if it contains the keywords
      run: |
       echo say hello
    - name: test
      # if: contains(github.event.comment.body, '/test')  # check the comment if it contains the keywords
      run: |
       echo test
   if: always()
    - name: Write comment
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: '👋 Thanks for reporting!'
          })